blockers: []

questions:
  - iOS tab bar hiding - NativeTabs minimizeBehavior won't fire on horizontal PagerView. Options evaluated - decided to hide on Android now, revisit iOS post-MVP.

decisions:
  - rejected-horizontal-carousel: User felt carousel on sessions tab didn't make sense for mobile UX
  - rejected-vertical-list-with-rich-cards: Too incremental, not creative enough
  - chosen-always-terminal: App opens directly to terminal PagerView. Sessions are browser tabs. Last page is launchpad.
  - two-finger-vertical-for-workspaces: 2-finger swipe up/down switches host workspace. Avoids conflict with WebView single-finger terminal scroll.
  - global-pager-not-per-host: PagerView spans all sessions across all hosts (sorted by lastAttached), not scoped to one host like current terminal.tsx
  - launchpad-as-last-page: Every workspace's last swipe = launchpad page with usage rings + new session + hosts/projects/settings nav
  - overview-grid-with-rings: [⊞] button opens full-screen overlay with usage rings strip + session grid grouped by host

findings:
  - terminal-already-has-pagerview: app/session/[hostId]/[name]/terminal.tsx already uses PagerView from react-native-pager-view for per-host session swiping. Can reuse same pattern.
  - preview-field-exists: Session type already has preview?: string[] field, just needs preview:true added to useHostsLive options
  - useDeviceType-exists: lib/useDeviceType.ts already exists with TABLET_BREAKPOINT=600. Use isTablet for responsive layout.
  - ios-uses-native-tabs: iOS uses NativeTabs (expo-router/unstable-native-tabs) with minimizeBehavior="onScrollDown". Tab bar won't auto-hide on horizontal PagerView scroll.
  - ipad-sidebar-risk: iPadOS 18+ NativeTabs may render as sidebar, making useWindowDimensions().width return full screen width. Mitigation: use onLayout on PagerView container.
  - rn-gesture-handler-available: react-native-gesture-handler already in project (PagerView depends on it). Can use Gesture.Pan().minPointers(2) for 2-finger workspace switching.

worked:
  - Iterating on designs with the user through ASCII art mockups before committing to plan
  - User responded well to direct questions like "which of these 3 options?" rather than open-ended

failed:
  - First carousel concept (horizontal sessions list) - user rejected as not making sense for mobile
  - Generic "be creative" interpretation led to wrong direction initially

