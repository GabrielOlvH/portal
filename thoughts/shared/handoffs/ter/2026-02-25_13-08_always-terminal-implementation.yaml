blockers:
  - Overview is still a Modal with preview cards — user wants actual PagerView scale-down zoom effect
  - Multiple iteration cycles caused frustration — user wants cleaner, simpler architecture

questions:
  - Should the overview be implemented by scaling the actual PagerView (transform scale) or keep as separate modal?
  - How should screen pages (hosts/projects/settings) appear in the overview zoom-out?
  - Should screen pages show in the session picker sheet?

decisions:
  - unified-tabs: Dropped NativeTabs on iOS, using expo-router Tabs for both platforms with tabBarStyle display none
  - floating-pill-not-header: Replaced full header row with minimal semi-transparent pill overlay at top of terminals
  - screen-pages-openable: Hosts/Projects/Settings are openable pages (like browser tabs) — opened from launchpad, closeable with X button
  - launchpad-as-workspace: Launchpad included in workspace list for 2-finger vertical swipe

findings:
  - GestureDetector-collapsable: GestureDetector children must be wrapped in View with collapsable={false} to prevent view-flattening errors
  - PagerView-key-stability: PagerView pages need stable keys and collapsable={false} on wrapper Views
  - TLDR-hook-blocks-agents: Background agents struggle with TLDR read-enforcer hook — agents should use Bash cat instead of Read tool
  - NativeTabs-no-hide: expo-router NativeTabs doesn't support per-screen tabBarStyle hiding, must use regular Tabs

worked:
  - Agent orchestration for initial implementation (Tasks 1-6) was fast and effective
  - Using Bash cat instead of Read tool to bypass TLDR hooks in agents
  - Parallel agents for _layout.tsx and index.tsx (no file conflicts)

failed:
  - Background agent for UX changes (remove header + redesign overview + dynamic pages) didn't implement most changes — only added imports
  - "Extra pages" naming confused the concept — user wanted them treated as regular pages, not special
  - Making screen pages permanently open misunderstood user intent — they want open/close like browser tabs
  - Multiple back-and-forth iterations on the same concept frustrated the user

next:
